<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bicycle Accessories — Ravi Cycle Company</title>
  <meta name="description" content="Shop premium bicycle accessories including seats, clamps, seat posts, covers, and more. Upgrade your ride with Ravi Cycle Company.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://ravicycles.com/accessories.html">
  <meta property="og:title" content="Bicycle Accessories — Ravi Cycle Company">
  <meta property="og:description" content="Shop premium bicycle accessories including seats, clamps, seat posts, covers, and more.">
  <meta property="og:url" content="https://ravicycles.com/accessories.html">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">
  <link rel="stylesheet" href="/src/css/global.css">
  <link rel="stylesheet" href="/src/css/header.css">
  <link rel="stylesheet" href="/src/css/products.css">
  <link rel="stylesheet" href="/src/css/footer.css">
  <link rel="stylesheet" href="/src/css/chatbot.css">
  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Bicycle Accessories",
    "description": "Shop premium bicycle accessories including seats, clamps, seat posts, covers, and more."
  }
  </script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="products-page">
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="separator">›</span>
        <span class="current">Accessories</span>
      </div>

      <div class="products-layout" style="grid-template-columns: 1fr;"> <!-- No sidebar for this design initially -->
        
        <div class="products-content">
          <!-- Filters Row matching reference image -->
          <div class="accessories-filters" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <select class="btn btn-outline btn-sm"><option>Price ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Search ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Collection ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Tags ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Product type ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Vendor ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Availability ▾</option></select>
            <select class="btn btn-outline btn-sm"><option>Discount ▾</option></select>
          </div>
          
          <div class="products-toolbar">
            <div class="products-count" id="products-count" style="visibility: hidden;">PRODUCTS</div>
            <div class="products-sort" style="margin-right: auto; margin-left: 0;">
              <select id="sort-select" class="btn btn-outline btn-sm" style="border: none; background: #f5f5f5;">
                <option value="featured">Sort by: Featured</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
              </select>
            </div>
          </div>

          <div class="products-grid" id="accessories-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script type="module">
    import { initCommon, renderStars } from '/src/js/components.js';
    import { initChatbot } from '/src/js/chatbot.js';

    document.addEventListener('DOMContentLoaded', async () => {
      initCommon();
      initChatbot();

      try {
        const response = await fetch('/api/accessories');
        const accessories = await response.json();
        const grid = document.getElementById('accessories-grid');

        grid.innerHTML = accessories.map(acc => `
          <div class="accessory-card" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
            <div class="accessory-image" style="height: 250px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
              <img src="${acc.image}" alt="${acc.name}" style="max-height: 100%; max-width: 100%; object-fit: contain;">
            </div>
            <h3 style="font-size: 14px; font-weight: 500; margin-bottom: 5px; color: #333;">${acc.name}</h3>
            <div class="stars" style="color: #FFA41C; font-size: 14px; margin-bottom: 10px;">
              ${renderStars(acc.rating)} <span style="color: #666; font-size: 12px;">(${acc.reviews})</span>
            </div>
            <div class="price" style="margin-bottom: 15px; font-size: 16px;">
              <span style="text-decoration: line-through; color: #999; margin-right: 8px;">₹${acc.mrp}</span>
              <strong style="color: #111;">${acc.price === 399 ? 'From ₹399' : '₹' + acc.price}</strong>
            </div>
            ${acc.inStock 
              ? `<button class="btn btn-accent" style="width: 100%; border-radius: 4px; padding: 10px; font-weight: 500; text-transform: none;" onclick="addToCart('${acc._id}')">${acc.price === 399 ? 'Choose options' : 'Add to cart'}</button>`
              : `<button class="btn" style="width: 100%; border-radius: 4px; padding: 10px; font-weight: 500; background: #f8c77e; color: #fff; cursor: not-allowed;" disabled>Sold out</button>`
            }
          </div>
        `).join('');

      } catch (error) {
        console.error('Error fetching accessories:', error);
      }
    });
  </script>
</body>
</html>
