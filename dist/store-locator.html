<body>
  <header class="site-header" id="site-header"></header>

  <main class="store-locator-page">
    <div class="container">
      <div class="store-locator-title">
        <h1>store locator</h1>
      </div>

      <!-- Search -->
      <div class="store-search">
        <div class="store-search-field">
          <label>Your location</label>
          <input type="text" id="store-search-input" placeholder="Enter city or pincode...">
        </div>
        <div class="store-search-field">
          <label>Search radius</label>
          <select id="search-radius">
            <option value="10">10 km</option>
            <option value="25">25 km</option>
            <option value="50" selected>50 km</option>
            <option value="100">100 km</option>
          </select>
        </div>
        <div class="store-search-field">
          <label>Results</label>
          <select id="results-count">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
          </select>
        </div>
        <button class="btn btn-primary" id="store-search-btn">Search</button>
      </div>

      <!-- Layout -->
      <div class="store-layout">
        <div class="store-list" id="store-list"></div>
        <div class="store-map">
          <div id="map"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
