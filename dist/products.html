<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Cycles — Ravi Cycle Company</title>
  <meta name="description" content="Browse our complete range of mountain, road, hybrid, kids, and electric bicycles. Filter by price, size, color, and more.">

  <!-- SEO tags -->
  <link rel="canonical" href="https://ravicycles.com/products.html">
  <meta property="og:title" content="All Cycles — Ravi Cycle Company">
  <meta property="og:description" content="Browse our complete range of mountain, road, hybrid, kids, and electric bicycles. Filter by price, size, color, and more.">
  <meta property="og:url" content="https://ravicycles.com/products.html">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "All Cycles",
    "description": "Browse our complete range of mountain, road, hybrid, kids, and electric bicycles."
  }
  </script>
  <script type="module" crossorigin src="/assets/products-nSrfWtqc.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/data-CISQquEW.js">
  <link rel="modulepreload" crossorigin href="/assets/footer-HvQ3RPj_.js">
  <link rel="modulepreload" crossorigin href="/assets/chatbot-noqMi_nh.js">
  <link rel="stylesheet" crossorigin href="/assets/footer-CASD2RMJ.css">
  <link rel="stylesheet" crossorigin href="/assets/chatbot-Bbz4P-is.css">
  <link rel="stylesheet" crossorigin href="/assets/home-BrYV3juj.css">
  <link rel="stylesheet" crossorigin href="/assets/products-CUMIlUgc.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <main class="products-page">
    <div class="container">
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="separator">›</span>
        <span class="current" id="breadcrumb-current">All Cycles</span>
      </div>

      <!-- Mobile filter button -->
      <button class="mobile-filter-btn" id="mobile-filter-btn">
        ☰ Filters
      </button>

      <!-- Filter overlay for mobile -->
      <div class="filter-overlay" id="filter-overlay"></div>

      <div class="products-layout">
        <!-- Filters Sidebar -->
        <aside class="filters-sidebar" id="filters-sidebar">
          <div class="filters-header">
            <h3>🔍 FILTER:</h3>
            <button class="reset-btn" id="reset-filters">Reset</button>
          </div>

          <!-- Availability -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Availability</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options">
              <label class="filter-checkbox">
                <input type="checkbox" name="availability" value="inStock" checked>
                In stock
                <span class="count" id="in-stock-count"></span>
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="availability" value="outOfStock">
                Out of stock
                <span class="count" id="out-stock-count"></span>
              </label>
            </div>
          </div>

          <!-- Price -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Price</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options">
              <div class="price-range">
                <input type="range" min="0" max="50000" value="50000" step="500" id="price-range">
                <div class="price-range-values">
                  <span>₹0</span>
                  <span id="price-range-value">₹50,000</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Category -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Category</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options" id="category-filters"></div>
          </div>

          <!-- Wheel Size -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Wheel Size</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options">
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="16T"> 16T
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="20T"> 20T
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="26T"> 26T
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="27.5T"> 27.5T
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="29T"> 29T
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="wheelSize" value="700C"> 700C
              </label>
            </div>
          </div>

          <!-- Color -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Color</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options">
              <div class="color-options" id="color-filters">
                <div class="color-swatch" data-color="Black" style="background: #1A1A1A" title="Black"></div>
                <div class="color-swatch" data-color="Red" style="background: #D32F2F" title="Red"></div>
                <div class="color-swatch" data-color="Blue" style="background: #2979FF" title="Blue"></div>
                <div class="color-swatch" data-color="Green" style="background: #00C853" title="Green"></div>
                <div class="color-swatch" data-color="Orange" style="background: #FF6D00" title="Orange"></div>
                <div class="color-swatch" data-color="Grey" style="background: #888888" title="Grey"></div>
                <div class="color-swatch" data-color="White" style="background: #F5F5F5; border: 1px solid #ddd" title="White"></div>
                <div class="color-swatch" data-color="Brown" style="background: #8B4513" title="Brown"></div>
              </div>
            </div>
          </div>

          <!-- Gear Type -->
          <div class="filter-group">
            <div class="filter-group-header">
              <h4>Gear Type</h4>
              <span class="toggle-icon">▼</span>
            </div>
            <div class="filter-options">
              <label class="filter-checkbox">
                <input type="checkbox" name="gear" value="Single Speed"> Single Speed
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="gear" value="7 Speed"> 7 Speed
              </label>
              <label class="filter-checkbox">
                <input type="checkbox" name="gear" value="21 Speed"> 21 Speed
              </label>
            </div>
          </div>
        </aside>

        <!-- Products Content -->
        <div class="products-content">
          <div class="products-toolbar">
            <div class="products-count" id="products-count">8 PRODUCTS</div>
            <div class="products-sort">
              <label>SORT BY:</label>
              <select id="sort-select">
                <option value="bestselling">Best selling</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="newest">Newest</option>
              </select>
            </div>
            <div class="products-view-toggle">
              <button class="view-btn active" data-view="grid" title="Grid view">▦</button>
              <button class="view-btn" data-view="list" title="List view">≡</button>
            </div>
          </div>

          <div class="products-grid" id="products-grid"></div>

          <div class="no-results" id="no-results" style="display: none;">
            <div class="icon">🔍</div>
            <h3>No cycles found</h3>
            <p>Try adjusting your filters or search terms</p>
            <button class="btn btn-primary" id="clear-all-filters">Clear All Filters</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

</body>
</html>
